name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    name: Build, typecheck, test & lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # The docs site is fully prerendered and deployed as static assets, so a
      # route that silently fails to prerender would 404 only in production.
      # This is not paranoia: `vite build` logs per-page render errors, still
      # prints "Prerendered N pages", and exits 0 — a completely broken site
      # passes the build. The raw-markdown routes are especially prone to it
      # (the prerender crawler can drop a brand-new route on the first pass),
      # so they are asserted explicitly.
      - name: Verify docs static output
        run: |
          set -euo pipefail
          out=apps/docs/dist/client
          for f in \
            index.html \
            404.html \
            docs/components/button/index.html \
            th/docs/components/button/index.html \
            static-search-en.json \
            static-search-th.json \
            llms.txt \
            llms-full.txt \
            raw/docs.md \
            raw/docs/theming.md \
            raw/docs/components/button.md \
            raw/th/docs/components/button.md
          do
            test -f "$out/$f" || { echo "::error::missing prerendered file: $out/$f"; exit 1; }
          done
          html=$(find "$out" -name '*.html' | wc -l)
          raw=$(find "$out/raw" -name '*.md' | wc -l)
          test "$html" -ge 19 || { echo "::error::expected >=19 prerendered pages, got $html"; exit 1; }
          test "$raw" -ge 34 || { echo "::error::expected >=34 raw markdown files, got $raw"; exit 1; }
          # Frontmatter must be stripped — a raw file starting with `---` means
          # the strip step regressed.
          head -c 3 "$out/raw/docs/components/button.md" | grep -qv -- '---' \
            || { echo "::error::raw markdown still contains frontmatter"; exit 1; }
          echo "docs static output OK ($html pages, $raw raw markdown files)"

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint
