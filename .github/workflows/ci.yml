name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    name: Build, typecheck, test & lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Format and lint run first, before the build. Neither needs one —
      # oxfmt and oxlint are single-pass native binaries that finish in well
      # under a second — and until now Lint sat at the very end, so a lint-only
      # failure cost a full build, prerender, typecheck and test run before it
      # said anything.
      #
      # The format gate is new: nothing has ever enforced formatting in this
      # repo, which is how 90 files came to be unformatted. Run `pnpm format`
      # before pushing.
      - name: Format
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      # Adding a component means editing 13 registration points across three
      # packages, and none of them depend on each other — miss one and you get
      # a component that silently doesn't export, isn't styled, or isn't
      # documented, with a green build. Two of the 13 are worse than silent:
      # an unknown `icon:` in MDX frontmatter renders nothing instead of
      # throwing, and the page-count floors below use `-ge`, so a stale floor
      # keeps passing even when half the site fails to render. This derives
      # every side from the source files, so it cannot drift the way the gaps
      # it closes did. Runs before the build because it is pure file reads.
      - name: Verify component wiring
        run: pnpm check-component-wiring

      - name: Build
        run: pnpm build

      # The docs site is fully prerendered and deployed as static assets, so a
      # route that silently fails to prerender would 404 only in production.
      # This is not paranoia: `vite build` logs per-page render errors, still
      # prints "Prerendered N pages", and exits 0 — a completely broken site
      # passes the build. The raw-markdown routes are especially prone to it
      # (the prerender crawler can drop a brand-new route on the first pass),
      # so they are asserted explicitly.
      - name: Verify docs static output
        run: |
          set -euo pipefail
          out=apps/docs/dist/client
          for f in \
            index.html \
            404.html \
            docs/components/button/index.html \
            th/docs/components/button/index.html \
            static-search-en.json \
            static-search-th.json \
            llms.txt \
            llms-full.txt \
            raw/docs.md \
            raw/docs/theming.md \
            raw/docs/components/button.md \
            raw/th/docs/components/button.md \
            docs/components/drawer/index.html \
            th/docs/components/drawer/index.html \
            raw/docs/components/drawer.md \
            docs/components/index.html \
            th/docs/components/index.html \
            raw/docs/components.md
          do
            test -f "$out/$f" || { echo "::error::missing prerendered file: $out/$f"; exit 1; }
          done
          html=$(find "$out" -name '*.html' | wc -l)
          raw=$(find "$out/raw" -name '*.md' | wc -l)
          # Floors are the real counts as of the last page addition (28
          # components plus the components folder index => 67 HTML, 64 raw),
          # not a token low number. A floor far below reality passes even when
          # half the site fails to render, which is exactly the failure this
          # step exists to catch. You no longer have to remember to raise them:
          # the "Verify component wiring" step above derives both numbers from
          # `apps/docs/vite.config.ts` and fails if these literals drift.
          test "$html" -ge 75 || { echo "::error::expected >=75 prerendered pages, got $html"; exit 1; }
          test "$raw" -ge 72 || { echo "::error::expected >=72 raw markdown files, got $raw"; exit 1; }
          # Frontmatter must be stripped — a raw file starting with `---` means
          # the strip step regressed.
          head -c 3 "$out/raw/docs/components/button.md" | grep -qv -- '---' \
            || { echo "::error::raw markdown still contains frontmatter"; exit 1; }
          echo "docs static output OK ($html pages, $raw raw markdown files)"

      # publint and attw both inspect the *built* `dist/` output of the
      # publishable packages, so this must come after `pnpm build`. Kairo's
      # `.` export is ESM-only by design (no `require`/`default` condition)
      # — that is intentional, not a bug to fix, so both tools are configured
      # to accept it instead of being silenced outright: attw's `esm-only`
      # profile ignores exactly the node10 and node16-from-CJS findings that
      # follow from that choice, and no broader ignore flags are used.
      # `@kairo-ui/theme`'s `./styles.css`/`./tokens.css` exports are pure
      # CSS with no JS or type content, which attw's type-resolution model
      # cannot represent (not a package defect), so those two entrypoints
      # are excluded from its scan. See each package's `check-exports`
      # script for the exact flags.
      # Also asserts the `'use client'` boundaries, which is why this reads
      # "artifacts" rather than "exports": see
      # `packages/react/scripts/check-use-client.mjs`.
      - name: Verify published package artifacts
        run: pnpm check-exports

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
