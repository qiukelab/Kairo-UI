name: Feature request
description: Suggest a new component, API, or enhancement for Kairo.
title: '[Feature]: '
labels: ['enhancement', 'needs triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please give us enough context to evaluate the request — the more concrete, the better.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem or limitation you're running into. Is this related to an existing component, a new component, or the theme system?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see happen? API sketches, prop names, or a rough code snippet are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've tried or considered.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links, screenshots, or references to similar features in other libraries (shadcn/ui, HeroUI, Radix, etc.) are helpful.
    validations:
      required: false
